version: 2

models:
  - name: fct_drive
    description: "Drive-level fact table (1 row per (game_id, drive)) aggregated from fct_play."
    columns:
      - name: game_id
        description: "Game identifier. Part of the composite primary key."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_game')
                field: game_id

      - name: drive
        description: "Drive number within a game. Part of the composite primary key."
        data_tests:
          - not_null

      - name: offense_franchise_id
        description: "Offense franchise_id for the drive."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_franchise')
                field: franchise_id
