version: 2

models:
  - name: fct_play_kick
    description: "Kick-play subfact at grain game_id + play_id. Includes punts, kickoffs, field goals, and extra points from regular drives. Excludes no_play rows and two-point attempts."
    columns:
      - name: game_id
        description: "Game identifier. Part of the composite primary key."
        data_tests:
          - not_null

      - name: play_id
        description: "Play identifier within a game. Part of the composite primary key."
        data_tests:
          - not_null

      - name: offense_franchise_id
        description: "Offense franchise_id inherited from fct_play."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_franchise')
                field: franchise_id

      - name: defense_franchise_id
        description: "Defense franchise_id inherited from fct_play."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_franchise')
                field: franchise_id
