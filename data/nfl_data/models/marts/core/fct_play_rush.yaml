version: 2

models:
  - name: fct_play_rush
    description: "Rush-play subfact at grain game_id + play_id. Includes rush attempts and QB scrambles from regular drives. Excludes no_play rows, sacks, two-point attempts, and kneels."
    columns:
      - name: game_id
        description: "Game identifier. Part of the composite primary key."
        data_tests:
          - not_null

      - name: play_id
        description: "Play identifier within a game. Part of the composite primary key."
        data_tests:
          - not_null

      - name: offense_franchise_id
        description: "Offense franchise_id inherited from fct_play."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_franchise')
                field: franchise_id

      - name: defense_franchise_id
        description: "Defense franchise_id inherited from fct_play."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_franchise')
                field: franchise_id
